<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Collector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header card">
      <div>
        <h1>Job Collector</h1>
        <p class="subtitle">Учебный интерфейс для работы с вакансиями</p>
      </div>
      <div class="header-actions">
        <a href="/add" class="btn">Добавить вакансию</a>
        <button id="parseBtn" class="btn btn-primary">Запустить парсинг fake-jobs</button>
      </div>
    </header>

    <div id="notification" class="notification hidden" role="status" aria-live="polite"></div>

    <section class="card controls">
      <h2>Поиск вакансий</h2>
      <form id="searchForm" class="search-row">
        <input
          id="searchInput"
          type="text"
          placeholder="Например: Developer Google Blagoveshensk"
        />
        <select id="sortByFilter">
          <option value="">Без сортировки</option>
          <option value="created_at">По дате добавления</option>
          <option value="salary">По зарплате</option>
        </select>
        <button type="submit" class="btn btn-primary">Найти</button>
        <button type="button" id="resetFiltersBtn" class="btn">Сбросить</button>
      </form>
      <p class="hint">Поиск по ключевым словам в title/company/location/description/url и salary.</p>
    </section>

    <section>
      <div id="vacanciesList" class="vacancies"></div>
      <div id="emptyState" class="card empty hidden">Вакансии не найдены.</div>
      <nav id="pagination" class="pagination"></nav>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
